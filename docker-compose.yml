services:
  postgres:
    image: postgres:15-alpine
    container_name: yolab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yolab}
      POSTGRES_USER: ${POSTGRES_USER:-yolab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yolab_password}
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: yolab-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-yolab}:${POSTGRES_PASSWORD:-yolab_password}@postgres:5432/${POSTGRES_DB:-yolab}
      DOMAIN: ${DOMAIN:-demycode.ovh}
      WG_SERVER_ENDPOINT: ${WG_SERVER_ENDPOINT}
      WG_SERVER_PUBLIC_KEY: ${WG_SERVER_PUBLIC_KEY}
      IPV6_SUBNET_BASE: ${IPV6_SUBNET_BASE}
      PORT: 5000
    ports:
      - "5000:5000"

  dns-server:
    build:
      context: ./dns_server
    container_name: yolab-dns
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DOMAIN: ${DOMAIN:-demycode.ovh}
      WG_SERVER_IPV6: ${WG_SERVER_IPV6}
      REGISTRATION_API_URL: http://backend:5000
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "53:53/udp"
