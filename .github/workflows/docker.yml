name: Build and push container images

on:
  push:
    branches: [main, master]
    paths:
      - apps/wg-sidecar/**
      - apps/wg-register/**

jobs:
  pre-commit:
    uses: ./.github/workflows/pre-commit.yml

  build-and-push:
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wg-sidecar
        uses: docker/build-push-action@v6
        with:
          context: apps/wg-sidecar
          push: true
          tags: ghcr.io/demycode/wg-sidecar:latest

      - name: Build and push wg-register
        uses: docker/build-push-action@v6
        with:
          context: apps/wg-register
          push: true
          tags: ghcr.io/demycode/wg-register:latest
