name: Build and push container images

on:
  push:
    branches: [main, master]
    paths:
      - apps/wg-sidecar/**
      - apps/wg-register/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}-${{ hashFiles('flake.lock') }}

      - name: Run pre-commit
        run: nix develop path:. --command pre-commit run --all-files --show-diff-on-failure
        env:
          UV_PYTHON_PREFERENCE: only-system

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wg-sidecar
        uses: docker/build-push-action@v6
        with:
          context: apps/wg-sidecar
          push: true
          tags: ghcr.io/demycode/wg-sidecar:latest

      - name: Build and push wg-register
        uses: docker/build-push-action@v6
        with:
          context: apps/wg-register
          push: true
          tags: ghcr.io/demycode/wg-register:latest
