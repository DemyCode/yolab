name: Deploy YoLab with Terraform

on:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Verify secrets
        run: |
          for secret in HCLOUD_TOKEN SSH_PUBLIC_KEY SSH_PRIVATE_KEY DOMAIN; do
            if [ -z "${{ secrets[secret] }}" ]; then
              echo "Error: $secret secret is not set"
              exit 1
            fi
          done

      - name: Terraform Init
        working-directory: deployment/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: deployment/terraform
        run: |
          terraform plan -out=tfplan \
            -var="hcloud_token=${{ secrets.HCLOUD_TOKEN }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="ssh_private_key=${{ secrets.SSH_PRIVATE_KEY }}" \
            -var="ssh_key_name=${{ secrets.SSH_KEY_NAME || 'yolab-deployment-key' }}" \
            -var="domain=${{ secrets.DOMAIN }}" \
            -var="wg_server_type=${{ secrets.WG_SERVER_TYPE || 'cpx22' }}" \
            -var="services_server_type=${{ secrets.SERVICES_SERVER_TYPE || 'cpx22' }}" \
            -var="hetzner_location=${{ secrets.HETZNER_LOCATION || 'nbg1' }}"

      - name: Terraform Apply
        working-directory: deployment/terraform
        run: terraform apply -auto-approve tfplan

      - name: Get outputs
        working-directory: deployment/terraform
        run: |
          terraform output -json deployment_summary
          terraform output -json dns_configuration
