# Stub config used by CI to evaluate the NixOS system without real secrets.
# All values here are dummies — this file is never deployed to a real machine.

[homelab]
hostname = "yolab-ci"
timezone = "UTC"
locale = "en_US.UTF-8"
ssh_port = 22
root_ssh_key = ""
allowed_ssh_keys = []
homelab_password_hash = ""

[tunnel]
enabled = false
platform_api_url = "https://api.yolab.dev"
account_token = ""
service_name = "homelab"
service_id = 0
wg_private_key = ""
wg_public_key = ""
sub_ipv6 = "fd00:1::"
sub_ipv6_private = "fd00:cafe::1"
wg_server_endpoint = "1.2.3.4:51820"
wg_server_public_key = ""
dns_url = "https://ci.example.com"

[node]
node_id = "ci"

[node.k3s]
role = "server"
token = "ci-token"
server_addr = ""

[velero]
enabled = false
s3_endpoint = "https://s3.amazonaws.com"
s3_bucket = "ci-bucket"
s3_region = "us-east-1"
s3_access_key = ""
s3_secret_key = ""

[yolab_external]
url = ""
account_token = ""
