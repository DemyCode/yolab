apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: yolab
provisioner: csi.yolab.dev
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: yolab-csi
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: yolab-csi
  template:
    metadata:
      labels:
        app: yolab-csi
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: csi-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.9.0
          args:
            - --csi-address=/run/yolab-csi/csi.sock
            - --kubelet-registration-path=/run/yolab-csi/csi.sock
          volumeMounts:
            - name: csi-socket
              mountPath: /run/yolab-csi
            - name: registration-dir
              mountPath: /registration
        - name: liveness-probe
          image: registry.k8s.io/sig-storage/livenessprobe:v2.11.0
          args:
            - --csi-address=/run/yolab-csi/csi.sock
          volumeMounts:
            - name: csi-socket
              mountPath: /run/yolab-csi
      volumes:
        - name: csi-socket
          hostPath:
            path: /run/yolab-csi
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/rancher/k3s/agent/kubelet/plugins_registry
            type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yolab-csi
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: yolab-csi
rules:
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, update]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list, watch]
  - apiGroups: [storage.k8s.io]
    resources: [csinodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: yolab-csi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yolab-csi
subjects:
  - kind: ServiceAccount
    name: yolab-csi
    namespace: kube-system
