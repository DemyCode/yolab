apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v19.2.0
  dataDirHostPath: /var/lib/rook
  mon:
    count: 1
    allowMultiplePerNode: true
  mgr:
    count: 1
    allowMultiplePerNode: true
  dashboard:
    enabled: true
    ssl: false
    urlPrefix: /ceph-dashboard
  crashCollector:
    disable: true
  logCollector:
    enabled: false
  skipUpgradeChecks: true
  continueUpgradeAfterChecksEvenIfNotHealthy: true
  network:
    ipFamily: IPv6
  cephConfig:
    global:
      osd_pool_default_min_size: "1"
      osd_pool_default_size: "1"
      osd_heartbeat_grace: "60"
      mon_osd_report_timeout: "90"
      mds_beacon_grace: "60"
      ms_bind_ipv6: "true"
      ms_bind_ipv4: "false"
    osd:
      # Cap BlueStore's block cache so the OSD process stays well within its
      # memory limit and never gets OOM-killed mid-write. An OOM kill (SIGKILL)
      # can leave the BlueStore label half-written and unrecoverable.
      bluestore_cache_size_ssd: "1073741824"
      # Parallel backfill/recovery streams — default 1 makes migrations very slow.
      osd_max_backfills: "4"
      osd_recovery_max_active: "4"
  priorityClassNames:
    mon: system-cluster-critical
    mgr: system-cluster-critical
    osd: system-cluster-critical
  storage:
    useAllNodes: false
    useAllDevices: false
    # nodes list managed by osd-node-controller DaemonSet
  # Do NOT auto-remove OSDs — disk reconnection must re-integrate cleanly.
  # Intentional decommission requires explicit manual steps (osd out → purge).
  removeOSDsIfOutAndSafeToRemove: false
  disruptionManagement:
    # Pod disruption budgets can block node drains and K3s upgrades on single-node.
    managePodBudgets: false
  resources:
    mgr:
      limits:
        memory: "512Mi"
      requests:
        memory: "128Mi"
        cpu: "50m"
    mgr-sidecar:
      limits:
        memory: "64Mi"
      requests:
        memory: "32Mi"
        cpu: "10m"
    mon:
      limits:
        memory: "256Mi"
      requests:
        memory: "64Mi"
        cpu: "50m"
    osd:
      limits:
        memory: "3Gi"
      requests:
        memory: "512Mi"
        cpu: "100m"
    prepareosd:
      limits:
        memory: "256Mi"
      requests:
        memory: "64Mi"
        cpu: "50m"
---
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: yolab-fs
  namespace: rook-ceph
spec:
  metadataPool:
    replicated:
      size: 1
      requireSafeReplicaSize: false
  dataPools:
    - name: data0
      replicated:
        size: 1
        requireSafeReplicaSize: false
  preserveFilesystemOnDelete: true
  metadataServer:
    activeCount: 1
    activeStandby: false
    priorityClassName: system-cluster-critical
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        memory: "512Mi"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: yolab-cephfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rook-ceph.cephfs.csi.ceph.com
parameters:
  clusterID: rook-ceph
  fsName: yolab-fs
  pool: yolab-fs-data0
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-mgr-dashboard-nodeport
  namespace: rook-ceph
spec:
  type: NodePort
  clusterIP: fd00:43::cefd
  selector:
    app: rook-ceph-mgr
    mgr: a
  ports:
    - port: 7000
      targetPort: 7000
      nodePort: 30700
