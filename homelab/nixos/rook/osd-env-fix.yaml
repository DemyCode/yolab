---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osd-env-fix
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: osd-env-fix
  namespace: rook-ceph
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osd-env-fix
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: osd-env-fix
subjects:
  - kind: ServiceAccount
    name: osd-env-fix
    namespace: rook-ceph
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osd-env-fix
  namespace: rook-ceph
spec:
  # No ttlSecondsAfterFinished — the completed Job object stays so that
  # subsequent kubectl applies are no-ops. This Job runs exactly once.
  template:
    spec:
      serviceAccountName: osd-env-fix
      restartPolicy: OnFailure
      containers:
        - name: fix
          image: docker.io/rook/ceph:v1.16.3
          command:
            - /bin/sh
            - -c
            - |
              for dep in $(kubectl get deployments -n rook-ceph -l app=rook-ceph-osd -o name); do
                kubectl set env -n rook-ceph "$dep" \
                  CEPH_OSD_FLAVOR=classic \
                  CEPH_USE_RANDOM_NONCE- \
                  CEPH_VOLUME_DEBUG- \
                  CEPH_VOLUME_SKIP_RESTORECON-
              done
