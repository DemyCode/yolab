---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osd-env-fix
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: osd-env-fix
  namespace: rook-ceph
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osd-env-fix
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: osd-env-fix
subjects:
  - kind: ServiceAccount
    name: osd-env-fix
    namespace: rook-ceph
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: osd-env-fix
  namespace: rook-ceph
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 30
      template:
        spec:
          serviceAccountName: osd-env-fix
          restartPolicy: OnFailure
          containers:
            - name: fix
              image: bitnami/kubectl:1.31.0
              command:
                - /bin/sh
                - -c
                - |
                  for dep in $(kubectl get deployments -n rook-ceph -l app=rook-ceph-osd -o name); do
                    kubectl set env -n rook-ceph "$dep" \
                      CEPH_USE_RANDOM_NONCE- \
                      CEPH_VOLUME_DEBUG- \
                      CEPH_VOLUME_SKIP_RESTORECON-
                  done
