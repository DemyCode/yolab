---
# Watches every storage node, reads its block devices from sysfs, and reconciles
# spec.storage.nodes in the CephCluster CR every 30s.
#
# Before adding a physical disk it checks its BlueStore label (pure Python read):
#   - label from our cluster  → include as-is (Rook re-integrates the OSD)
#   - label from another cluster → wipe first, exclude this cycle, re-add next
#   - no label                → include as-is (Rook provisions a fresh OSD)
#
# Deploy with:
#   kubectl create configmap osd-node-controller-script \
#     --from-file=reconcile.py=osd-node-controller.py \
#     -n rook-ceph --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f osd-node-controller.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osd-node-controller
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: osd-node-controller
  namespace: rook-ceph
rules:
  - apiGroups: ["ceph.rook.io"]
    resources: ["cephclusters"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: osd-node-controller
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: osd-node-controller
subjects:
  - kind: ServiceAccount
    name: osd-node-controller
    namespace: rook-ceph
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: osd-node-controller
  namespace: rook-ceph
spec:
  selector:
    matchLabels:
      app: osd-node-controller
  template:
    metadata:
      labels:
        app: osd-node-controller
    spec:
      serviceAccountName: osd-node-controller
      tolerations:
        - operator: Exists
      initContainers:
        - name: install-deps
          image: python:3.12-slim
          command: [pip, install, kubernetes, --quiet, --target, /deps]
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: controller
          image: python:3.12-slim
          command: [python3, /scripts/reconcile.py]
          securityContext:
            # Needed to open raw block devices for BlueStore label reading and wiping.
            privileged: true
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PYTHONPATH
              value: /deps
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: deps
              mountPath: /deps
            - name: host-sys
              mountPath: /host-sys
              readOnly: true
            - name: host-dev
              mountPath: /host-dev
          resources:
            requests:
              memory: 48Mi
              cpu: 5m
            limits:
              memory: 96Mi
      volumes:
        - name: script
          configMap:
            name: osd-node-controller-script
        - name: deps
          emptyDir: {}
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-dev
          hostPath:
            path: /dev
