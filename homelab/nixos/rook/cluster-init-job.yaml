apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-cluster-init
  namespace: rook-ceph
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: quay.io/ceph/ceph:v19.2.0
          command:
            - bash
            - -c
            - |
              set -e
              MON=$(cat /etc/rook/mon-endpoints | cut -d= -f2)
              cp /etc/ceph/keyring /tmp/.ck
              printf '[global]\nmon_host = %s\n' "$MON" > /tmp/.cc
              CEPH="ceph -c /tmp/.cc --keyring /tmp/.ck -n client.admin"

              # Disable the balancer module — prevents proactive PG shuffling between
              # healthy in-service disks. Unlike norebalance, this does NOT block drain:
              # marking an OSD out still moves PGs via CRUSH remapping (a separate path).
              echo "Disabling balancer..."
              $CEPH balancer off

              echo "Balancer status:"
              $CEPH balancer status
          volumeMounts:
            - name: mon-endpoints
              mountPath: /etc/rook
            - name: admin-keyring
              mountPath: /etc/ceph
      volumes:
        - name: mon-endpoints
          configMap:
            name: rook-ceph-mon-endpoints
            items:
              - key: data
                path: mon-endpoints
        - name: admin-keyring
          secret:
            secretName: rook-ceph-admin-keyring
            items:
              - key: keyring
                path: keyring
