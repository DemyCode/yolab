repos:
  - repo: local
    hooks:
      - id: sync
        name: sync
        entry: uv sync --all-extras --all-groups --all-packages
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --config ./pyproject.toml
        language: system
        types: [python]

      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check --fix --config ./pyproject.toml
        language: system
        types: [python]

      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
